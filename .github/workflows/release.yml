name: Build & Release

on:
  push:
    tags:
      - 'v*'   # v0.1.0, v1.0.0 gibi tag'larda tetiklenir

jobs:
  release:
    runs-on: windows-latest 
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Uyarıyı kaldıran komut
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24' # Node sürümünü de güncelleyelim
          cache: 'npm'

      - name: Bağımlılıkları yükle
        run: npm ci

      - name: Derle ve GitHub Releases'e yükle
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release'i yayınla (draft → published)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $prev = git describe --tags --abbrev=0 HEAD^ 2>$null
          if ($prev) {
            $notes = git log "$prev..HEAD" --pretty=format:"- %s" --no-merges | Where-Object { $_ -notmatch "Co-Authored-By|noreply@" }
          } else {
            $notes = git log --pretty=format:"- %s" --no-merges | Where-Object { $_ -notmatch "Co-Authored-By|noreply@" }
          }
          ($notes -join "`n") | Out-File -FilePath notes.md -Encoding utf8
          gh release edit $tag --draft=false --latest --notes-file notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
