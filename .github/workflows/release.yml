name: Build & Release

on:
  push:
    tags:
      - 'v*'   # v0.1.0, v1.0.0 gibi tag'larda tetiklenir

jobs:
  release:
    runs-on: windows-latest 
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Uyarıyı kaldıran komut
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24' # Node sürümünü de güncelleyelim
          cache: 'npm'

      - name: Bağımlılıkları yükle
        run: npm ci

      - name: Derle ve GitHub Releases'e yükle
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release'i yayınla (draft → published)
        run: gh release edit "${{ github.ref_name }}" --draft=false --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
